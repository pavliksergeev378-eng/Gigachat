<style>
:root {
  --bg-primary: #1f1f1e;
  --bg-secondary: #1f1e1c;
  --bg-sidebar: #262626;
  --bg-input: #2c2c2a;
  --bg-card: #2a2a28;
  --border: #363432;
  --text-primary: #d4d4d4;
  --text-secondary: #8a8a8a;
  --text-muted: #5a5a5a;
  --accent: #d4a574;
  --accent-hover: #c08a5a;
  --green: #4caf50;
  --red: #e74c3e;
  --orange: #f0ad4e;
  --sidebar-width: 280px;
}
:root[data-theme="light"] {
  --bg-primary: #fdfdfc;
  --bg-secondary: #f3f1ec;
  --bg-sidebar: #fdfdfc;
  --bg-input: #fffffe;
  --bg-card: #f7f5f0;
  --border: #e3dfd5;
  --text-primary: #1f1f1e;
  --text-secondary: #6b6b68;
  --text-muted: #a8a59f;
  --accent: #b8895d;
  --accent-hover: #a0764d;
  --green: #3d9140;
  --red: #c0392b;
  --orange: #d48f2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* ===== HEADER ===== */
.cp-header{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0}
.cp-header a{color:var(--text-secondary);text-decoration:none;display:flex;align-items:center;gap:4px;font-size:13px}
.cp-header a:hover{color:var(--accent)}
.cp-header h2{font-size:15px;font-weight:600;flex:1;color:var(--accent)}
.cp-header .cp-status{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.cp-header .cp-status .cp-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.cp-header .cp-status .cp-dot.idle{background:var(--text-muted)}
.cp-header .cp-status .cp-dot.running{background:var(--orange);animation:pulse 0.8s infinite}
.cp-header .cp-status .cp-dot.done{background:var(--green)}
.cp-header .cp-status .cp-dot.error{background:var(--red)}
/* ===== LAYOUT ===== */
.cp-layout{display:flex;flex:1;overflow:hidden}
/* ===== SIDEBAR STEPS ===== */
.cp-steps{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cp-steps-header{padding:14px 16px 8px;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);flex-shrink:0}
.cp-steps-list{flex:1;overflow-y:auto;padding:8px}
.cp-step{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:4px;border-radius:8px;font-size:13px;transition:0.15s;border:1px solid transparent}
.cp-step .cp-step-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--bg-card);border:2px solid var(--border);color:var(--text-muted)}
.cp-step .cp-step-body{flex:1;min-width:0}
.cp-step .cp-step-title{font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-step .cp-step-desc{font-size:10px;color:var(--text-muted);margin-top:1px}
.cp-step .cp-step-status{font-size:10px;white-space:nowrap;color:var(--text-muted)}
.cp-step.pending{opacity:0.5}
.cp-step.pending .cp-step-icon{border-color:var(--border)}
.cp-step.running .cp-step-icon{border-color:var(--orange);background:var(--orange);color:#fff;animation:pulse 0.8s infinite}
.cp-step.done .cp-step-icon{border-color:var(--green);background:var(--green);color:#fff}
.cp-step.done .cp-step-status{color:var(--green)}
.cp-step.error .cp-step-icon{border-color:var(--red);background:var(--red);color:#fff}
.cp-step.error .cp-step-status{color:var(--red)}
.cp-step .cp-step-toggle{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:10px;padding:2px}
.cp-step .cp-step-toggle:hover{color:var(--accent)}
.cp-step-result{display:none;padding:6px 12px 6px 42px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border);max-height:120px;overflow-y:auto;word-break:break-word}
.cp-step-result.open{display:block}
.cp-step-result pre{font-size:10px;white-space:pre-wrap;background:var(--bg-card);padding:6px 8px;border-radius:4px;margin:4px 0;color:var(--text-secondary);max-height:80px;overflow-y:auto}
/* ===== MAIN CHAT ===== */
.cp-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cp-chat{flex:1;overflow-y:auto;padding:24px 40px 20px}
.cp-chat .cp-welcome{text-align:center;padding:40px 20px;color:var(--text-muted)}
.cp-chat .cp-welcome h3{font-size:18px;color:var(--text-primary);margin-bottom:8px}
.cp-chat .cp-welcome p{font-size:13px;line-height:1.6}
.cp-chat .cp-welcome .cp-chain-preview{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;font-size:13px}
.cp-chat .cp-welcome .cp-chain-preview .cp-arrow{color:var(--text-muted)}
.cp-chat .cp-welcome .cp-chain-preview .cp-node-tag{padding:4px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-primary)}
.cp-msg{margin-bottom:12px;padding:10px 16px;border-radius:10px;font-size:14px;line-height:1.5;max-width:85%;word-wrap:break-word}
.cp-msg.user{background:var(--bg-user);color:var(--text-primary);margin-left:auto;border:1px solid var(--border)}
.cp-msg.bot{background:var(--bg-bot,var(--bg-secondary));color:var(--text-primary);margin-right:auto;border:1px solid var(--border)}
.cp-msg.bot .cp-msg-step{font-size:10px;color:var(--accent);margin-bottom:4px;font-weight:500}
.cp-msg.bot .cp-msg-error{color:var(--red);font-weight:500}
.cp-msg.bot .cp-msg-raw{font-size:11px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);max-height:150px;overflow-y:auto}
.cp-msg.bot .cp-msg-raw pre{font-size:10px;white-space:pre-wrap;margin-top:4px}
.cp-msg .cp-loading-dots{display:flex;gap:4px;align-items:center;height:20px}
.cp-msg .cp-loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:dotPulse 1.4s infinite}
.cp-msg .cp-loading-dots span:nth-child(2){animation-delay:0.2s}
.cp-msg .cp-loading-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{opacity:0.3}40%{opacity:1}}
/* ===== INPUT AREA ===== */
.cp-input-area{display:flex;gap:8px;padding:12px 20px 20px;flex-shrink:0;align-items:flex-end}
.cp-input-area input[type="text"]{flex:1;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-primary);font-family:inherit;font-size:15px;outline:none;transition:border-color 0.2s;min-height:40px}
.cp-input-area input[type="text"]:focus{border-color:var(--accent)}
.cp-input-area input[type="text"]:disabled{opacity:0.4}
.cp-input-area button{padding:10px 20px;border-radius:10px;border:1px solid var(--border);background:var(--accent);color:#fff;cursor:pointer;font-size:14px;font-weight:500;transition:0.15s;white-space:nowrap;min-height:40px}
.cp-input-area button:hover{background:var(--accent-hover)}
.cp-input-area button:disabled{opacity:0.4;cursor:default}
/* ===== MISC ===== */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.cp-scrollbar::-webkit-scrollbar{width:5px}
.cp-scrollbar::-webkit-scrollbar-track{background:transparent}
.cp-scrollbar::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>

<body>
<div class="cp-header">
  <a href="../GigaChat-Platform.html" aria-label="Назад">← Назад</a>
  <h2 id="cpTitle">▶ Цепочка агентов</h2>
  <div class="cp-status">
    <span class="cp-dot idle" id="cpStatusDot"></span>
    <span id="cpStatusLabel">Готов</span>
  </div>
</div>
<div class="cp-layout">
  <!-- Steps sidebar -->
  <div class="cp-steps">
    <div class="cp-steps-header">📋 Шаги цепочки</div>
    <div class="cp-steps-list cp-scrollbar" id="cpStepsList"></div>
  </div>
  <!-- Main chat area -->
  <div class="cp-main">
    <div class="cp-chat cp-scrollbar" id="cpChat">
      <div class="cp-welcome" id="cpWelcome">
        <h3>▶ Цепочка готова к запуску</h3>
        <p>Введите запрос в поле ниже — он пройдёт по всем шагам цепочки.<br>Результат каждого шага отображается в боковой панели.</p>
        <div class="cp-chain-preview" id="cpChainPreview"></div>
      </div>
    </div>
    <div class="cp-input-area">
      <input type="text" id="cpInput" placeholder="Введите запрос..." autocomplete="off" disabled>
      <button id="cpSend" disabled>Отправить</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  /* ============================================================
   * Парсинг сценария из URL
   * ============================================================ */
  function parseScenario() {
    // URL hash: #scenario=<base64>
    var hash = location.hash.replace(/^#/, '');
    if (hash) {
      try {
        // Сначала decodeURIComponent (на случай если base64 содержит %-encoded символы)
        var hashDecoded = decodeURIComponent(hash);
        // btoa/atob в браузере: для Unicode нужно decodeURIComponent(escape(raw))
        var raw = atob(hashDecoded);
        return JSON.parse(raw);
      } catch(e) {
        console.warn('[CP] Failed to parse hash scenario:', e);
        return null;
      }
    }
    // Query: ?scenario=<base64> или ?workflow=<webhookUrl>
    var params = new URLSearchParams(location.search);
    var qs = params.get('scenario');
    if (qs) {
      try { return JSON.parse(atob(qs)); } catch(e) { return null; }
    }
    // Если ничего нет — показываем демо-данные (для ручного тестирования)
    return getDefaultScenario();
  }

  function getDefaultScenario() {
    // Демо сценарий для тестирования UI
    return {
      "name": "Демо: GigaChat → Math",
      "steps": [
        {
          "id": "step_1",
          "label": "💬 GigaChat Talk",
          "desc": "Отправляет запрос в GigaChat",
          "webhookUrl": "http://localhost:5678/webhook/chat",
          "params": { "model": "GigaChat-Pro" },
          "inputMapping": { "message": "$.input.text" },
          "outputMapping": { "result": "$.output.text" }
        },
        {
          "id": "step_2",
          "label": "🧮 GigaChat Math",
          "desc": "Выполняет вычисления",
          "webhookUrl": "http://localhost:5678/webhook/math",
          "params": {},
          "inputMapping": { "expression": "steps.step_1.output.result" },
          "outputMapping": { "result": "$.output.answer" }
        }
      ],
      "finalOutput": "steps.step_2.output.result"
    };
  }

  /* ============================================================
   * ChainRunner — исполняет цепочку шагов
   * ============================================================ */
  function createChainRunner(steps, callbacks) {
    var aborted = false;
    var state = { outputs: {} };

    function getByPath(obj, path) {
      return path.split('.').reduce(function(o, k){ return (o && o[k] !== undefined) ? o[k] : undefined; }, obj);
    }

    function resolveInput(mapping, stepState) {
      var input = {};
      if (!mapping) return input;
      Object.keys(mapping).forEach(function(port) {
        var source = mapping[port];
        if (!source || typeof source !== 'string') { input[port] = source; return; }
        if (source.startsWith('$.')) {
          input[port] = getByPath(stepState, source.slice(2));
        } else if (source.startsWith('steps.')) {
          input[port] = getByPath(state, source);
        } else {
          input[port] = source;
        }
      });
      return input;
    }

    function simulateStep(step, stepInput, idx) {
      // Симулируем ответ, если n8n недоступен
      var simData = {
        response: '⚡ Симулированный ответ от ' + step.label + '\n\nВходные данные: ' + JSON.stringify(stepInput, null, 2)
      };
      return new Promise(function(resolve) {
        setTimeout(function() {
          state.outputs[step.id] = simData;
          resolve({ data: simData, simulated: true });
        }, 800);
      });
    }

    function run(scenarioInput) {
      aborted = false;
      state = { input: scenarioInput || {}, outputs: {} };
      var results = [];

      function nextStep(idx) {
        if (aborted) return Promise.resolve({ aborted: true });
        if (idx >= steps.length) return Promise.resolve({ done: true, results: results });

        var step = steps[idx];
        var stepInput = resolveInput(step.inputMapping, state);

        if (callbacks && callbacks.onStepStart) callbacks.onStepStart(step, idx);

        // Если n8n офлайн — симулируем
        if (!bootFlags.n8nOnline) {
          return simulateStep(step, stepInput, idx).then(function(sim) {
            if (aborted) return;
            state.outputs[step.id] = sim.data;
            results.push({ stepId: step.id, label: step.label, output: sim.data, simulated: true });
            if (callbacks && callbacks.onStepComplete) callbacks.onStepComplete(step, sim.data, idx);
            return nextStep(idx + 1);
          });
        }

        // Реальный запрос к n8n
        var controller = new AbortController();
        var timeout = setTimeout(function(){ controller.abort(); }, (step.timeout || 120) * 1000);

        // Добавляем токен авторизации в заголовки
        var authHeaders = { 'Content-Type': 'application/json' };
        var token = GigaChat.auth.getToken();
        if (token) authHeaders['X-Auth-Token'] = token;

        return fetch(step.webhookUrl, {
          method: 'POST',
          headers: authHeaders,
          body: JSON.stringify(stepInput),
          signal: controller.signal,
        }).then(function(res) {
          clearTimeout(timeout);
          if (!res.ok) {
            return res.text().then(function(body) {
              throw new Error('HTTP ' + res.status + ': ' + (body || res.statusText).slice(0, 500));
            });
          }
          return res.json();
        }).then(function(data) {
          if (aborted) return;
          state.outputs[step.id] = data;
          results.push({ stepId: step.id, label: step.label, output: data });
          if (callbacks && callbacks.onStepComplete) callbacks.onStepComplete(step, data, idx);
          return nextStep(idx + 1);
        }).catch(function(err) {
          clearTimeout(timeout);
          if (err.name === 'AbortError') err = new Error('Превышено время ожидания (' + (step.timeout || 120) + 'c)');

          // Если fetch упал (n8n не отвечает) — помечаем n8n как офлайн и симулируем этот шаг
          if (err.message.indexOf('Failed to fetch') >= 0 || err.message.indexOf('ERR_CONNECTION') >= 0) {
            bootFlags.n8nOnline = false;
            return simulateStep(step, stepInput, idx).then(function(sim) {
              if (aborted) return;
              state.outputs[step.id] = sim.data;
              results.push({ stepId: step.id, label: step.label, output: sim.data, simulated: true });
              addChatMessage('system', '⚠ ' + step.label + ': n8n недоступен, использованы тестовые данные');
              if (callbacks && callbacks.onStepComplete) callbacks.onStepComplete(step, sim.data, idx);
              return nextStep(idx + 1);
            });
          }

          var errInfo = { stepId: step.id, label: step.label, error: err.message };
          results.push(errInfo);
          if (callbacks && callbacks.onStepError) callbacks.onStepError(step, err.message, idx);
          return { error: errInfo, results: results };
        });
      }

      return nextStep(0);
    }

    function abort() {
      aborted = true;
    }

    return { run: run, abort: abort };
  }

  /* ============================================================
   * UI — рендер цепочки
   * ============================================================ */
  var scenario = null;
  var runner = null;
  var isRunning = false;

  function initUI() {
    scenario = parseScenario();
    if (!scenario) {
      document.getElementById('cpTitle').textContent = '⏳ Нет сценария';
      document.getElementById('cpWelcome').querySelector('h3').textContent = 'Нет данных для запуска';
      document.getElementById('cpWelcome').querySelector('p').textContent = 'Откройте эту страницу из Node Editor (кнопка ▶ Run).';
      document.getElementById('cpChainPreview').innerHTML = '<span style="color:var(--red)">Сценарий не передан</span>';
      document.getElementById('cpInput').disabled = true;
      document.getElementById('cpSend').disabled = true;
      return;
    }

    document.getElementById('cpTitle').textContent = '▶ ' + (scenario.name || 'Цепочка агентов');

    // Render chain preview
    var preview = document.getElementById('cpChainPreview');
    if (scenario.steps) {
      var html = '';
      scenario.steps.forEach(function(s, i) {
        if (i > 0) html += '<span class="cp-arrow">→</span>';
        html += '<span class="cp-node-tag">' + s.label + '</span>';
      });
      preview.innerHTML = html;
    }

    // Render steps sidebar
    renderSteps();

    // Enable input
    document.getElementById('cpInput').disabled = false;
    document.getElementById('cpSend').disabled = false;
    document.getElementById('cpInput').focus();
  }

  function renderSteps() {
    var list = document.getElementById('cpStepsList');
    list.innerHTML = '';
    if (!scenario || !scenario.steps) return;
    scenario.steps.forEach(function(s, i) {
      var el = document.createElement('div');
      el.className = 'cp-step pending';
      el.id = 'cpStep-' + i;
      el.innerHTML =
        '<div class="cp-step-icon">' + (i + 1) + '</div>' +
        '<div class="cp-step-body">' +
          '<div class="cp-step-title">' + s.label + '</div>' +
          '<div class="cp-step-desc">' + (s.desc || (s.agentId || 'webhook')) + '</div>' +
        '</div>' +
        '<span class="cp-step-status">ожидает</span>';
      list.appendChild(el);
    });
  }

  function setStepStatus(idx, status, msg) {
    var el = document.getElementById('cpStep-' + idx);
    if (!el) return;
    el.className = 'cp-step ' + status;
    var labels = { pending: 'ожидает', running: 'выполняется…', done: '✓ готово', error: '✗ ошибка' };
    el.querySelector('.cp-step-status').textContent = labels[status] || msg || status;
    // Add a toggle button when done
    if (status === 'done' || status === 'error') {
      var existingToggle = el.querySelector('.cp-step-toggle');
      if (!existingToggle) {
        var toggle = document.createElement('button');
        toggle.className = 'cp-step-toggle';
        toggle.textContent = '▶';
        toggle.onclick = function() {
          var res = document.getElementById('cpStepResult-' + idx);
          if (res) res.classList.toggle('open');
          toggle.textContent = res && res.classList.contains('open') ? '▼' : '▶';
        };
        el.appendChild(toggle);
      }
    }
  }

  function setStepResult(idx, data) {
    var existing = document.getElementById('cpStepResult-' + idx);
    if (existing) existing.remove();
    var el = document.createElement('div');
    el.className = 'cp-step-result';
    el.id = 'cpStepResult-' + idx;
    try {
      var pretty = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      el.innerHTML = '<pre>' + escapeHtml(pretty.slice(0, 500)) + '</pre>';
    } catch(e) {
      el.innerHTML = '<pre>' + escapeHtml(String(data)) + '</pre>';
    }
    var stepEl = document.getElementById('cpStep-' + idx);
    if (stepEl && stepEl.parentNode) {
      stepEl.parentNode.insertBefore(el, stepEl.nextSibling);
    }
  }

  /* ============================================================
   * Отправка сообщения
   * ============================================================ */
  function sendMessage() {
    var input = document.getElementById('cpInput');
    var text = input.value.trim();
    if (!text || isRunning) return;

    // Parse as JSON if it looks like an object
    var payload = { message: text };

    // Add to chat
    addChatMessage(text, 'user');
    addChatMessage(renderLoadingDots(), 'bot', 'cp-loading-msg');

    // Disable input
    isRunning = true;
    input.disabled = true;
    document.getElementById('cpSend').disabled = true;
    setHeaderStatus('running', 'Выполняется…');

    runner = createChainRunner(scenario.steps, {
      onStepStart: function(step, idx) {
        setStepStatus(idx, 'running');
        scrollSteps();
        // Update chat: show which step is running
        updateLoadingMsg('Шаг ' + (idx + 1) + ': ' + step.label + '…');
      },
      onStepComplete: function(step, data, idx) {
        setStepStatus(idx, 'done');
        setStepResult(idx, data);
        scrollSteps();
        // Show intermediate result in chat if not the last step
        var isLast = (idx === scenario.steps.length - 1);
        if (!isLast && step.showIntermediate !== false) {
          var interimText = extractText(data);
          if (interimText) {
            addChatMessage(interimText, 'bot', null, step.label);
          }
        }
      },
      onStepError: function(step, errMsg, idx) {
        setStepStatus(idx, 'error', errMsg);
        setStepResult(idx, errMsg);
        scrollSteps();
        // Remove loading message
        removeLoadingMsg();
        addChatMessage('❌ Ошибка на шаге «' + step.label + '»: ' + errMsg, 'bot', null, step.label);
      }
    });

    runner.run({ text: text }).then(function(result) {
      isRunning = false;
      input.disabled = false;
      document.getElementById('cpSend').disabled = false;
      input.value = '';
      input.focus();

      if (result && result.aborted) {
        setHeaderStatus('idle', 'Остановлено');
        removeLoadingMsg();
        return;
      }

      if (result && result.error) {
        setHeaderStatus('error', 'Ошибка');
        removeLoadingMsg();
        return;
      }

      // Success — show final answer
      setHeaderStatus('done', 'Готово');
      removeLoadingMsg();

      // Try to extract final output
      var finalOutput = null;
      if (scenario.finalOutput) {
        var paths = scenario.finalOutput.split('.');
        var lastData = result.results[result.results.length - 1]?.output;
        if (lastData) {
          finalOutput = paths.reduce(function(o, k){ return (o && o[k] !== undefined) ? o[k] : undefined; }, { steps: { last: lastData } });
        }
      }
      if (finalOutput === null || finalOutput === undefined) {
        finalOutput = extractText(result.results[result.results.length - 1]?.output);
      }

      if (finalOutput) {
        addChatMessage(String(finalOutput), 'bot');
      } else {
        addChatMessage('✅ Цепочка выполнена. Результаты на боковой панели.', 'bot');
      }
    });
  }

  /* ============================================================
   * UI helpers
   * ============================================================ */
  function addChatMessage(text, type, id, stepLabel) {
    var chat = document.getElementById('cpChat');
    var el = document.createElement('div');
    if (id) el.id = id;
    el.className = 'cp-msg ' + type;
    if (stepLabel) {
      el.innerHTML = '<div class="cp-msg-step">⚡ ' + stepLabel + '</div>' + text;
    } else {
      el.innerHTML = text;
    }
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;

    // Hide welcome if first message
    var welcome = document.getElementById('cpWelcome');
    if (welcome) welcome.style.display = 'none';
  }

  function renderLoadingDots() {
    return '<div class="cp-loading-dots"><span></span><span></span><span></span></div>';
  }

  function updateLoadingMsg(text) {
    var el = document.getElementById('cp-loading-msg');
    if (el) el.innerHTML = text || renderLoadingDots();
  }

  function removeLoadingMsg() {
    var el = document.getElementById('cp-loading-msg');
    if (el) el.remove();
  }

  function setHeaderStatus(state, label) {
    var dot = document.getElementById('cpStatusDot');
    var statusLabel = document.getElementById('cpStatusLabel');
    dot.className = 'cp-dot ' + state;
    statusLabel.textContent = label;
  }

  function scrollSteps() {
    var list = document.getElementById('cpStepsList');
    if (list) list.scrollTop = list.scrollHeight;
  }

  function extractText(data) {
    if (!data) return null;
    if (typeof data === 'string') return data;
    // Common response patterns from GigaChat agents
    return data.response || data.answer || data.text || data.result || data.message || data.output || JSON.stringify(data, null, 2);
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ============================================================
   * Event handlers
   * ============================================================ */
  document.getElementById('cpSend').addEventListener('click', sendMessage);
  document.getElementById('cpInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ============================================================
   * Boot
   * ============================================================ */
  var bootFlags = { n8nOnline: false, serverOnline: false };

  function boot() {
    // Проверка авторизации. Если токен невалидный — редирект на login.
    GigaChat.auth.requireAuth({
      onOk: function(username) {
        // Проверка n8n
        var n8nBase = (window.GIGACHAT_CONFIG || {}).N8N_BASE || 'http://localhost:5678';
        document.documentElement.classList.remove('gc-pending-auth');

        var n8nCtrl = new AbortController();
        var n8nTimer = setTimeout(function(){ n8nCtrl.abort(); }, 2000);
        fetch(n8nBase + '/healthz', { method: 'HEAD', signal: n8nCtrl.signal })
          .then(function() {
            clearTimeout(n8nTimer);
            bootFlags.n8nOnline = true;
            initUI();
          })
          .catch(function() {
            clearTimeout(n8nTimer);
            bootFlags.n8nOnline = false;
            console.log('[CP] n8n недоступен — работаем с симулированными ответами');
            initUI();
          });
      }
    });
  }

  boot();
})();
</script>
</body>
</html>

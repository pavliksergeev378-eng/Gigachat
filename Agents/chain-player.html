  --bg-primary: #1f1f1e;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* ===== HEADER ===== */
.cp-header{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0}

.cp-header h2{font-size:15px;font-weight:600;flex:1;color:var(--accent)}
.cp-header .cp-status{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.cp-header .cp-status .cp-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.cp-header .cp-status .cp-dot.idle{background:var(--text-muted)}
.cp-header .cp-status .cp-dot.running{background:var(--orange);animation:pulse 0.8s infinite}
.cp-header .cp-status .cp-dot.done{background:var(--green)}
.cp-header .cp-status .cp-dot.error{background:var(--red)}
/* ===== LAYOUT ===== */
.cp-layout{display:flex;flex:1;overflow:hidden}
/* ===== SIDEBAR STEPS ===== */
.cp-steps{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cp-steps-header{padding:14px 16px 8px;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);flex-shrink:0}
.cp-steps-list{flex:1;overflow-y:auto;padding:8px}
.cp-step{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:4px;border-radius:8px;font-size:13px;transition:0.15s;border:1px solid transparent}
.cp-step .cp-step-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--bg-card);border:2px solid var(--border);color:var(--text-muted)}
.cp-step .cp-step-body{flex:1;min-width:0}
.cp-step .cp-step-title{font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-step .cp-step-desc{font-size:10px;color:var(--text-muted);margin-top:1px}
.cp-step .cp-step-status{font-size:10px;white-space:nowrap;color:var(--text-muted)}
.cp-step.pending{opacity:0.5}
.cp-step.pending .cp-step-icon{border-color:var(--border)}
.cp-step.running .cp-step-icon{border-color:var(--orange);background:var(--orange);color:#fff;animation:pulse 0.8s infinite}
.cp-step.done .cp-step-icon{border-color:var(--green);background:var(--green);color:#fff}
.cp-step.done .cp-step-status{color:var(--green)}
.cp-step.error .cp-step-icon{border-color:var(--red);background:var(--red);color:#fff}
.cp-step.error .cp-step-status{color:var(--red)}
.cp-step .cp-step-toggle{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:10px;padding:2px}
.cp-step .cp-step-toggle:hover{color:var(--accent)}
.cp-step-result{display:none;padding:6px 12px 6px 42px;font-size:11px;color:var(--text-secondary);border-bottom:1px solid var(--border);max-height:120px;overflow-y:auto;word-break:break-word}

/* ===== MAIN CHAT ===== */

.cp-msg{margin-bottom:12px;padding:10px 16px;border-radius:10px;font-size:14px;line-height:1.5;max-width:85%;word-wrap:break-word}

.cp-msg.bot .cp-msg-step{font-size:10px;color:var(--accent);margin-bottom:4px;font-weight:500}
.cp-msg.bot .cp-msg-error{color:var(--red);font-weight:500}
.cp-msg.bot .cp-msg-raw{font-size:11px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);max-height:150px;overflow-y:auto}
.cp-msg.bot .cp-msg-raw pre{font-size:10px;white-space:pre-wrap;margin-top:4px}
.cp-msg .cp-loading-dots{display:flex;gap:4px;align-items:center;height:20px}
.cp-msg .cp-loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:dotPulse 1.4s infinite}
.cp-msg .cp-loading-dots span:nth-child(2){animation-delay:0.2s}

<script>
(function(){
  'use strict';

  /* ============================================================
   * Парсинг сценария из URL
   * ============================================================ */
      function parseScenario() {
    // Сначала проверяем sessionStorage (наиболее надёжный способ для window.open)
    try {
      var stored = sessionStorage.getItem('gc_scenario');
      if (stored) {
        sessionStorage.removeItem('gc_scenario'); // одноразовое чтение
        return JSON.parse(stored);
      }
    } catch(e) {}
    // URL hash: #scenario=<base64>
    var hash = location.hash.replace(/^#/, '');
    if (hash) {
      try {
        var hashDecoded = decodeURIComponent(hash);
        // Версия 1 (node-editor до фикса): btoa(unescape(encodeURIComponent(jsonStr)))
        // Версия 2 (прямая): base64 без unicode-wrap
        try {
          var raw = atob(hashDecoded);
          return JSON.parse(decodeURIComponent(escape(raw)));
        } catch(e2) {
          try {
            var raw = atob(hashDecoded);
            return JSON.parse(raw);
          } catch(e3) {}
        }
      } catch(e) {
        console.warn('[CP] Failed to parse hash scenario:', e);
        return null;
      }
    }
    // Query: ?scenario=<base64> or ?workflow=<webhookUrl>
    var params = new URLSearchParams(location.search);
    var qs = params.get('scenario');
    if (qs) {
      try { return JSON.parse(decodeURIComponent(escape(atob(qs)))); } catch(e) {
        try { return JSON.parse(atob(qs)); } catch(e2) {}
      }
    }
    // Nothing found -> show demo data
    return getDefaultScenario();
  }

  function getDefaultScenario() {
    // Демо сценарий для тестирования UI
    return {
      "name": "Демо: GigaChat → Math",
      "steps": [
        {
          "id": "step_1",
          "label": "💬 GigaChat Talk",
          "desc": "Отправляет запрос в GigaChat",
          "webhookUrl": "http://localhost:5678/webhook/chat",
          "params": { "model": "GigaChat-Pro" },
          "inputMapping": { "message": "$.input.text" },
          "outputMapping": { "result": "$.output.text" }
        },
        {
          "id": "step_2",
          "label": "🧮 GigaChat Math",
          "desc": "Выполняет вычисления",
          "webhookUrl": "http://localhost:5678/webhook/math",
          "params": {},
          "inputMapping": { "expression": "steps.step_1.output.result" },
          "outputMapping": { "result": "$.output.answer" }
        }
      ],
      "finalOutput": "steps.step_2.output.result"
    };
  }

  /* ============================================================
   * Приведение n8n URL к локальному proxy-серверу
   * ============================================================ */
  function n8nProxyBase() {
    var cfg = window.GIGACHAT_CONFIG || {};

    // Явная настройка имеет максимальный приоритет.
    if (cfg.N8N_PROXY_BASE) {
      return String(cfg.N8N_PROXY_BASE).replace(/\/$/, '');
    }

    // ВАЖНО:
    // Если страница открыта как http://130.100.94.119:8765,
    // то http://localhost:8777 для браузера означает НЕ сервер,
    // а компьютер пользователя. Поэтому proxy должен искаться на том же host,
    // где открыта страница, но на порту 8777.
    var host = window.location.hostname || 'localhost';
    var protocol = window.location.protocol || 'http:';

    if (host && host !== 'localhost' && host !== '127.0.0.1') {
      return protocol + '//' + host + ':8777';
    }

    return 'http://localhost:8777';
  }

  function proxiedN8nUrl(url) {
    if (!url) return url;
    try {
      var u = new URL(url, location.href);

      // Страница остаётся на localhost:8765, а запросы к n8n идут через
      // локальный proxy на localhost:8777.
      if (
        u.pathname.indexOf('/webhook') === 0 ||
        u.pathname.indexOf('/webhook-trigger') === 0 ||
        u.pathname.indexOf('/rest/') === 0
      ) {
        return n8nProxyBase() + u.pathname + u.search + u.hash;
      }

      return u.href;
    } catch (e) {
      return url;
    }
  }

  /* ============================================================
   * Общие helpers для нормализации ответа webhook
   * ВАЖНО: должны быть в верхней области видимости, потому что
   * используются и ChainRunner, и отрисовкой ответа.
   * ============================================================ */
  function isPlainEmptyObject(obj) {
    return obj && typeof obj === 'object' && !Array.isArray(obj) && Object.keys(obj).length === 0;
  }

  function normalizeWebhookResponse(data) {
    // n8n webhooks часто возвращают массив item'ов: [{json:{...}}]
    if (Array.isArray(data)) {
      if (data.length === 1) return normalizeWebhookResponse(data[0]);
      return { items: data };
    }

    // n8n item wrapper
    if (data && typeof data === 'object' && data.json && Object.keys(data).length <= 2) {
      return normalizeWebhookResponse(data.json);
    }

    // Иногда полезная часть лежит в body/data/output
    if (data && typeof data === 'object') {
      if (data.body && typeof data.body === 'object') return normalizeWebhookResponse(data.body);
      if (data.data && typeof data.data === 'object' && !data.response && !data.answer && !data.text) return normalizeWebhookResponse(data.data);
    }

    return data;
  }

  /* ============================================================
   * ChainRunner — исполняет цепочку шагов
   * ============================================================ */
  function createChainRunner(steps, callbacks) {
    var aborted = false;
    var state = { outputs: {}, steps: {} };
    var results = [];

    function getByPath(obj, path) {
      return path.split('.').reduce(function(o, k){ return (o && o[k] !== undefined) ? o[k] : undefined; }, obj);
    }

    function resolveInput(mapping, stepState) {
      var input = {};
      if (!mapping) return input;
      Object.keys(mapping).forEach(function(port) {
        var source = mapping[port];
        if (!source || typeof source !== 'string') { input[port] = source; return; }
        if (source.startsWith('$.')) {
          input[port] = getByPath(stepState, source.slice(2));
        } else if (source.startsWith('steps.')) {
          input[port] = getByPath(state, source);
        } else {
          input[port] = source;
        }
      });
      return input;
    }

    function pickTextFromValue(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      if (Array.isArray(value)) return value.map(pickTextFromValue).filter(Boolean).join('\n');

      if (typeof value === 'object') {
        var preferred = [
          // Смысловые поля для передачи между агентами.
          // code/raw_result/stage специально НЕ используем как обычный ответ,
          // иначе следующий агент получает Python-код вместо результата.
          'response', 'answer', 'result', 'stdout',
          'text', 'message', 'output', 'content', 'final', 'value'
        ];

        for (var i = 0; i < preferred.length; i++) {
          var key = preferred[i];
          if (value[key] != null) {
            var picked = pickTextFromValue(value[key]);
            if (picked) return picked;
          }
        }

        // n8n иногда возвращает { json: {...} } или { body: {...} }
        if (value.json != null) {
          var jsonText = pickTextFromValue(value.json);
          if (jsonText) return jsonText;
        }
        if (value.body != null) {
          var bodyText = pickTextFromValue(value.body);
          if (bodyText) return bodyText;
        }
        if (value.data != null) {
          var dataText = pickTextFromValue(value.data);
          if (dataText) return dataText;
        }
      }

      return '';
    }

    function hasUsefulValue(value) {
      if (value == null) return false;
      if (typeof value === 'string') return value.trim() !== '';
      if (typeof value === 'number' || typeof value === 'boolean') return true;
      if (Array.isArray(value)) return value.some(hasUsefulValue);
      if (typeof value === 'object') {
        return Object.keys(value).some(function(k) { return hasUsefulValue(value[k]); });
      }
      return false;
    }

    function getPreviousStepOutput(idx) {
      if (idx <= 0) return null;
      var prevStep = steps[idx - 1];
      if (!prevStep) return null;
      return state.outputs[prevStep.id] || (state.steps[prevStep.id] && state.steps[prevStep.id].output) || null;
    }

    function getOriginalUserText() {
      var input = state.input || {};
      return pickTextFromValue(input.text) ||
             pickTextFromValue(input.message) ||
             pickTextFromValue(input.input) ||
             pickTextFromValue(input.query) ||
             pickTextFromValue(input);
    }

    function getLastResultTransferText() {
      // Ищем последний нормальный смысловой текст выше по цепочке.
      // Нужно для случая, когда текущий предыдущий агент вернул только:
      // { response: "", code: "...", raw_result: "", stage: "execute" }.
      for (var i = results.length - 1; i >= 0; i--) {
        var item = results[i];
        if (!item) continue;

        var fromOutput = pickTextFromValue(item.output);
        if (fromOutput) return fromOutput;

        if (item.transferText && String(item.transferText).trim()) {
          return String(item.transferText).trim();
        }

        if (item.input) {
          var fromInput = pickTextFromValue(item.input.previous_text) ||
                          pickTextFromValue(item.input.message) ||
                          pickTextFromValue(item.input.input) ||
                          pickTextFromValue(item.input.query) ||
                          pickTextFromValue(item.input.expression);
          if (fromInput) return fromInput;
        }
      }
      return '';
    }

    function enrichStepInput(stepInput, step, idx) {
      var input;
      if (stepInput && typeof stepInput === 'object' && !Array.isArray(stepInput)) {
        input = Object.assign({}, stepInput);
      } else if (stepInput != null) {
        input = { input: stepInput };
      } else {
        input = {};
      }

      var previousOutput = getPreviousStepOutput(idx);
      var previousText = pickTextFromValue(previousOutput);
      var lastTransferText = getLastResultTransferText();
      var originalText = getOriginalUserText();
      var fallbackText = previousText || lastTransferText || originalText || '';

      // Главная логика v11:
      // первый шаг получает исходный ввод пользователя;
      // последующие шаги получают результат предыдущего шага;
      // если предыдущий шаг вернул только технический объект code/stage,
      // берём последний нормальный смысловой текст выше по цепочке.
      var shouldPreferPrevious = idx > 0 && !!(previousText || lastTransferText);
      var effectiveText = shouldPreferPrevious ? (previousText || lastTransferText) : fallbackText;

      // Заполняем пустые значения.
      Object.keys(input).forEach(function(k) {
        if (!hasUsefulValue(input[k]) && effectiveText) {
          input[k] = effectiveText;
        }
      });

      // Для последующих шагов принудительно кладём previousText
      // в основные поля. Это предотвращает ситуацию, когда 3-й агент
      // получает исходный запрос пользователя вместо результата 2-го.
      if (shouldPreferPrevious) {
        [
          'message',
          'input',
          'query',
          'expression',
          'text',
          'content',
          'file'
        ].forEach(function(k) {
          input[k] = previousText;
        });
      }

      // Если mapping вообще ничего полезного не дал — даём агенту универсальный вход.
      if (!hasUsefulValue(input) && effectiveText) {
        input.input = effectiveText;
      }

      // Универсальные поля, чтобы разные агенты могли взять то, что ожидают.
      if (effectiveText) {
        if (!hasUsefulValue(input.message)) input.message = effectiveText;
        if (!hasUsefulValue(input.query)) input.query = effectiveText;
        if (!hasUsefulValue(input.input)) input.input = effectiveText;
        if (!hasUsefulValue(input.expression)) input.expression = effectiveText;
      }

      if (previousOutput != null && input.previous == null) input.previous = previousOutput;
      if ((previousText || effectiveText) && input.previous_text == null) input.previous_text = previousText || effectiveText;
      if (originalText && input.original_input == null) input.original_input = originalText;
      input.chain_transfer_source = shouldPreferPrevious ? 'previous_step' : 'original_input';
      input.chain_transfer_text = effectiveText || '';

      return input;
    }

    function buildAgentPayload(stepInput, step, idx) {
      var payload;
      if (stepInput && typeof stepInput === 'object' && !Array.isArray(stepInput)) {
        payload = Object.assign({}, stepInput);
      } else {
        payload = { input: stepInput };
      }

      var token = '';
      var username = '';
      var displayName = '';
      try { token = GigaChat.auth.getToken() || ''; } catch (e) {}
      try { username = GigaChat.auth.getUsername() || ''; } catch (e) {}
      try { displayName = GigaChat.auth.getDisplayName() || ''; } catch (e) {}

      if (payload.message == null || payload.message === '') {
        payload.message = pickTextFromValue(payload.input);
      }
      if (payload.message == null || payload.message === '') {
        payload.message = pickTextFromValue(stepInput);
      }

      // Критично: обычные агенты платформы проверяют token именно в JSON-body.
      // Заголовок X-Auth-Token оставляем тоже, но для n8n workflows важнее body.token.
      if (token && payload.token == null) payload.token = token;
      if (username && payload.user_name == null) payload.user_name = username;
      if (displayName && payload.display_name == null) payload.display_name = displayName;

      if (payload.session_id == null || payload.session_id === '') {
        payload.session_id = state.session_id || 'chain_' + Date.now().toString(36);
      }

      payload.chain_step_id = step.id;
      payload.chain_step_label = step.label;
      payload.chain_step_index = idx;
      payload.chain_mode = 'preview';

      return payload;
    }

    function maskPayloadForLog(payload) {
      var safe = Object.assign({}, payload || {});
      if (safe.token) safe.token = '***';
      return safe;
    }

    function simulateStep(step, stepInput, idx) {
      // Используем тестовый ответ, если n8n недоступен
      var demoText =
        pickTextFromValue(stepInput && stepInput.message) ||
        pickTextFromValue(stepInput && stepInput.input) ||
        pickTextFromValue(stepInput && stepInput.query) ||
        pickTextFromValue(stepInput && stepInput.expression) ||
        'demo input';
      var simData = {
        response: '⚡ DEMO: ' + step.label + ' получил: ' + demoText
      };
      return new Promise(function(resolve) {
        setTimeout(function() {
          state.outputs[step.id] = simData;
          resolve({ data: simData, simulated: true });
        }, 800);
      });
    }

    function run(scenarioInput) {
      aborted = false;
      state = { input: scenarioInput || {}, outputs: {}, steps: {}, session_id: 'chain_' + Date.now().toString(36) + '_' + Math.random().toString(16).slice(2) };
      results = [];

      function nextStep(idx) {
        if (aborted) return Promise.resolve({ aborted: true });
        if (idx >= steps.length) return Promise.resolve({ done: true, results: results });

        var step = steps[idx];
        var stepInput = resolveInput(step.inputMapping, state);
        stepInput = enrichStepInput(stepInput, step, idx);

        if (callbacks && callbacks.onStepStart) callbacks.onStepStart(step, idx);

        // ВАЖНО v14:
        // автоматический demo/fallback отключён. Если proxy/n8n недоступен,
        // цепочка НЕ должна притворяться успешной и красить шаги зелёным.
        // Demo разрешён только явно через ?demo=1.
        if (!bootFlags.n8nOnline) {
          if (isDemoModeExplicit()) {
            return simulateStep(step, stepInput, idx).then(function(sim) {
              if (aborted) return;
              var simTransferText =
                pickTextFromValue(sim.data) ||
                pickTextFromValue(stepInput && stepInput.previous_text) ||
                pickTextFromValue(stepInput && stepInput.message) ||
                pickTextFromValue(stepInput && stepInput.input) ||
                pickTextFromValue(stepInput && stepInput.query) ||
                pickTextFromValue(stepInput && stepInput.expression) ||
                '';
              state.outputs[step.id] = sim.data;
              state.steps[step.id] = { input: stepInput, output: sim.data, transferText: simTransferText };
              results.push({ stepId: step.id, label: step.label, input: stepInput, output: sim.data, transferText: simTransferText, simulated: true });
              if (callbacks && callbacks.onStepComplete) callbacks.onStepComplete(step, sim.data, idx);
              return nextStep(idx + 1);
            });
          }

          var offlineErr = new Error(n8nUnavailableMessage());
          var offlineInfo = { stepId: step.id, label: step.label, error: offlineErr.message, offline: true };
          results.push(offlineInfo);
          if (callbacks && callbacks.onStepError) callbacks.onStepError(step, offlineErr.message, idx);
          return Promise.resolve({ error: offlineInfo, results: results });
        }

        // Реальный запрос к n8n
        var controller = new AbortController();
        var timeout = setTimeout(function(){ controller.abort(); }, (step.timeout || 120) * 1000);

        // Добавляем токен авторизации и служебные поля не только в headers,
        // но и в JSON-body. Именно body.token ожидают защищённые n8n-агенты.
        var authHeaders = { 'Content-Type': 'application/json' };
        var token = GigaChat.auth.getToken();
        if (token) authHeaders['X-Auth-Token'] = token;

        var requestUrl = proxiedN8nUrl(step.webhookUrl);
        var requestPayload = buildAgentPayload(stepInput, step, idx);
        console.log('[CP] step request', {
          step: step.label,
          url: requestUrl,
          input: stepInput,
          payload: maskPayloadForLog(requestPayload),
          previous: getPreviousStepOutput(idx),
          previous_text: pickTextFromValue(getPreviousStepOutput(idx)),
          transfer_text: stepInput && (stepInput.chain_transfer_text || stepInput.previous_text || stepInput.message || stepInput.input || stepInput.query || stepInput.expression),
          transfer_source: stepInput && stepInput.chain_transfer_source
        });

        return fetch(requestUrl, {
          method: 'POST',
          headers: authHeaders,
          body: JSON.stringify(requestPayload),
          signal: controller.signal,
        }).then(function(res) {
          clearTimeout(timeout);
          if (!res.ok) {
            return res.text().then(function(body) {
              throw new Error('HTTP ' + res.status + ': ' + (body || res.statusText).slice(0, 500));
            });
          }
          return res.text().then(function(text) {
            if (!text) return {};
            try { return JSON.parse(text); }
            catch(e) { return { response: text }; }
          });
        }).then(function(rawData) {
          if (aborted) return;
          var data = normalizeWebhookResponse(rawData);
          if (data && data.auth_required) {
            data = {
              response: '⚠ Агент вернул auth_required. Запрос дошёл до webhook, но агент не принял авторизацию. Проверьте, что в payload есть token, а workflow агента проверяет именно body.token.',
              auth_required: true,
              _request: { url: requestUrl, input: stepInput, payload: maskPayloadForLog(requestPayload) },
              _raw: rawData
            };
          }
          if (isPlainEmptyObject(data)) {
            data = {
              response: '⚠ Webhook вернул пустой JSON {}. Запрос дошёл до n8n, но workflow не вернул поле response/answer/text/result. Проверьте endpoint и последний узел n8n.',
              _empty: true,
              _request: { url: requestUrl, input: stepInput },
              _raw: rawData
            };
          }
          console.log('[CP] step response', { step: step.label, output: data });
          var stepTransferText =
            pickTextFromValue(data) ||
            pickTextFromValue(stepInput && stepInput.previous_text) ||
            pickTextFromValue(stepInput && stepInput.message) ||
            pickTextFromValue(stepInput && stepInput.input) ||
            pickTextFromValue(stepInput && stepInput.query) ||
            pickTextFromValue(stepInput && stepInput.expression) ||
            '';
          state.outputs[step.id] = data;
          state.steps[step.id] = { input: stepInput, output: data, transferText: stepTransferText };
          results.push({ stepId: step.id, label: step.label, input: stepInput, output: data, transferText: stepTransferText });
          if (callbacks && callbacks.onStepComplete) callbacks.onStepComplete(step, data, idx);
          return nextStep(idx + 1);
        }).catch(function(err) {
          clearTimeout(timeout);
          if (err.name === 'AbortError') err = new Error('Превышено время ожидания (' + (step.timeout || 120) + 'c)');

          // Если fetch упал — НЕ симулируем успех.
          // Иначе пользователь получает зелёные шаги и мусорный demo-ответ.
          if (err.message.indexOf('Failed to fetch') >= 0 || err.message.indexOf('ERR_CONNECTION') >= 0) {
            bootFlags.n8nOnline = false;

            if (isDemoModeExplicit()) {
              return simulateStep(step, stepInput, idx).then(function(sim) {
                if (aborted) return;
                var simTransferText =
                  pickTextFromValue(sim.data) ||
                  pickTextFromValue(stepInput && stepInput.previous_text) ||
                  pickTextFromValue(stepInput && stepInput.message) ||
                  pickTextFromValue(stepInput && stepInput.input) ||
                  pickTextFromValue(stepInput && stepInput.query) ||
                  pickTextFromValue(stepInput && stepInput.expression) ||
                  '';
                state.outputs[step.id] = sim.data;
                state.steps[step.id] = { input: stepInput, output: sim.data, transferText: simTransferText };
                results.push({ stepId: step.id, label: step.label, input: stepInput, output: sim.data, transferText: simTransferText, simulated: true });
                if (callbacks && callbacks.onStepComplete) callbacks.onStepComplete(step, sim.data, idx);
                return nextStep(idx + 1);
              });
            }

            err = new Error(n8nUnavailableMessage());
          }

          var errInfo = { stepId: step.id, label: step.label, error: err.message };
          results.push(errInfo);
          if (callbacks && callbacks.onStepError) callbacks.onStepError(step, err.message, idx);
          return { error: errInfo, results: results };
        });
      }

      return nextStep(0);
    }

    function abort() {
      aborted = true;
    }

    return { run: run, abort: abort };
  }

  /* ============================================================
   * UI — рендер цепочки
   * ============================================================ */
  var scenario = null;
  var runner = null;
  var isRunning = false;

  function initUI() {
    scenario = parseScenario();
    if (!scenario) {
      document.getElementById('cpTitle').textContent = '⏳ Нет сценария';
      document.getElementById('cpWelcome').querySelector('h3').textContent = 'Нет данных для запуска';
      document.getElementById('cpWelcome').querySelector('p').textContent = 'Откройте эту страницу из Node Editor (кнопка ▶ Run).';
      document.getElementById('cpChainPreview').innerHTML = '<span style="color:var(--red)">Сценарий не передан</span>';
      document.getElementById('cpInput').disabled = true;
      document.getElementById('cpSend').disabled = true;
      return;
    }

    document.getElementById('cpTitle').textContent = '▶ ' + (scenario.name || 'Цепочка агентов');

    // Render chain preview
    var preview = document.getElementById('cpChainPreview');
    if (scenario.steps) {
      var html = '';
      scenario.steps.forEach(function(s, i) {
        if (i > 0) html += '<span class="cp-arrow">→</span>';
        html += '<span class="cp-node-tag">' + s.label + '</span>';
      });
      preview.innerHTML = html;
    }

    // Render steps sidebar
    renderSteps();

    // Enable input
    document.getElementById('cpInput').disabled = false;
    document.getElementById('cpSend').disabled = false;
    document.getElementById('cpInput').focus();
  }

  function renderSteps() {
    var list = document.getElementById('cpStepsList');
    list.innerHTML = '';
    if (!scenario || !scenario.steps) return;
    scenario.steps.forEach(function(s, i) {
      var el = document.createElement('div');
      el.className = 'cp-step pending';
      el.id = 'cpStep-' + i;
      el.innerHTML =
        '<div class="cp-step-icon">' + (i + 1) + '</div>' +
        '<div class="cp-step-body">' +
          '<div class="cp-step-title">' + s.label + '</div>' +
          '<div class="cp-step-desc">' + (s.desc || (s.agentId || 'webhook')) + '</div>' +
        '</div>' +
        '<span class="cp-step-status">ожидает</span>';
      list.appendChild(el);
    });
  }

  function setStepStatus(idx, status, msg) {
    var el = document.getElementById('cpStep-' + idx);
    if (!el) return;
    el.className = 'cp-step ' + status;
    var labels = { pending: 'ожидает', running: 'выполняется…', done: '✓ готово', error: '✗ ошибка' };
    el.querySelector('.cp-step-status').textContent = labels[status] || msg || status;
    // Add a toggle button when done
    if (status === 'done' || status === 'error') {
      var existingToggle = el.querySelector('.cp-step-toggle');
      if (!existingToggle) {
        var toggle = document.createElement('button');
        toggle.className = 'cp-step-toggle';
        toggle.textContent = '▶';
        toggle.onclick = function() {
          var res = document.getElementById('cpStepResult-' + idx);
          if (res) res.classList.toggle('open');
          toggle.textContent = res && res.classList.contains('open') ? '▼' : '▶';
        };
        el.appendChild(toggle);
      }
    }
  }

  function setStepResult(idx, data) {
    var existing = document.getElementById('cpStepResult-' + idx);
    if (existing) existing.remove();
    var el = document.createElement('div');
    el.className = 'cp-step-result';
    el.id = 'cpStepResult-' + idx;
    try {
      var pretty = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      el.innerHTML = '<pre>' + escapeHtml(pretty.slice(0, 500)) + '</pre>';
    } catch(e) {
      el.innerHTML = '<pre>' + escapeHtml(String(data)) + '</pre>';
    }
    var stepEl = document.getElementById('cpStep-' + idx);
    if (stepEl && stepEl.parentNode) {
      stepEl.parentNode.insertBefore(el, stepEl.nextSibling);
    }
  }

  /* ============================================================
   * Отправка сообщения
   * ============================================================ */
  function sendMessage() {
    var input = document.getElementById('cpInput');
    var text = input.value.trim();
    if (!text || isRunning) return;

    // Parse as JSON if it looks like an object
    var payload = { message: text };

    // Add to chat
    addChatMessage(text, 'user');
    addChatMessage(renderLoadingDots(), 'bot', 'cp-loading-msg');

    // Disable input
    isRunning = true;
    input.disabled = true;
    document.getElementById('cpSend').disabled = true;
    setHeaderStatus('running', 'Выполняется…');

    runner = createChainRunner(scenario.steps, {
      onStepStart: function(step, idx) {
        setStepStatus(idx, 'running');
        scrollSteps();
        // Update chat: show which step is running
        updateLoadingMsg('Шаг ' + (idx + 1) + ': ' + step.label + '…');
      },
      onStepComplete: function(step, data, idx) {
        setStepStatus(idx, 'done');
        setStepResult(idx, data);
        scrollSteps();
        // Main chat is for the final user answer.
        // Intermediate results stay in the step sidebar and Console.
        // If a specific step really must be printed in chat, set:
        //   step.showIntermediate = true
        var isLast = (idx === scenario.steps.length - 1);
        if (!isLast && step.showIntermediate === true) {
          var interimText = extractText(data);
          if (interimText) {
            addChatMessage(interimText, 'bot', null, step.label);
          }
        }
      },
      onStepError: function(step, errMsg, idx) {
        setStepStatus(idx, 'error', errMsg);
        setStepResult(idx, errMsg);
        scrollSteps();
        // Remove loading message
        removeLoadingMsg();
        addChatMessage('❌ Ошибка на шаге «' + step.label + '»: ' + errMsg, 'bot', null, step.label);
      }
    });

    runner.run({ text: text }).then(function(result) {
      isRunning = false;
      input.disabled = false;
      document.getElementById('cpSend').disabled = false;
      input.value = '';
      input.focus();

      if (result && result.aborted) {
        setHeaderStatus('idle', 'Остановлено');
        removeLoadingMsg();
        return;
      }

      if (result && result.error) {
        setHeaderStatus('error', 'Ошибка');
        removeLoadingMsg();
        return;
      }

      // Success — show final answer
      setHeaderStatus('done', 'Готово');
      removeLoadingMsg();

      // Try to extract final output — ищем в outputs по пути
      var finalOutput = null;
      if (scenario.finalOutput && result.results && result.results.length) {
        // finalOutput = steps.step_1.output.response — берём из последнего шага
        var lastResult = result.results[result.results.length - 1];
        if (lastResult && lastResult.output) {
          var paths = scenario.finalOutput.split('.');
          // paths = ['steps', 'step_1', 'output', 'response']
          // lastResult.output содержит { response: '...' }
          // Срезаем 'steps.step_1.' — оставляем 'output.response'
          if (paths.length >= 2) {
            var innerPath = paths.slice(2).join('.');
            finalOutput = innerPath.split('.').reduce(function(o, k){ return (o && o[k] !== undefined) ? o[k] : undefined; }, lastResult.output);
          }
          if (finalOutput === null || finalOutput === undefined) {
            // fallback — просто текст ответа
            finalOutput = extractText(lastResult.output);
          }
        }
      }
      if (finalOutput === null || finalOutput === undefined) {
        finalOutput = extractText(result.results[result.results.length - 1]?.output);
      }

      var bestUserResult = extractBestUserFacingResult(result.results || []);
      if (finalOutput && String(finalOutput).trim()) {
        addChatMessage(String(finalOutput), 'bot');
      } else if (bestUserResult && bestUserResult.text) {
        addChatMessage(String(bestUserResult.text), 'bot');
        if (bestUserResult.sourceIndex !== result.results.length - 1) {
          console.info(
            '[CP] final fallback',
            'Последний агент не вернул человекочитаемый ответ. Показан последний нормальный результат из шага:',
            bestUserResult.sourceStep
          );
        }
      } else {
        addChatMessage('✅ Цепочка выполнена, но агенты не вернули человекочитаемый ответ. Подробности на боковой панели.', 'bot');
      }
    });
  }

  /* ============================================================
   * UI helpers
   * ============================================================ */
  function addChatMessage(text, type, id, stepLabel) {
    var chat = document.getElementById('cpChat');
    var el = document.createElement('div');
    if (id) el.id = id;
    el.className = 'cp-msg ' + type;
    if (stepLabel) {
      el.innerHTML = '<div class="cp-msg-step">⚡ ' + stepLabel + '</div>' + text;
    } else {
      el.innerHTML = text;
    }
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;

    // Hide welcome if first message
    var welcome = document.getElementById('cpWelcome');
    if (welcome) welcome.style.display = 'none';
  }

  function renderLoadingDots() {
    return '<div class="cp-loading-dots"><span></span><span></span><span></span></div>';
  }

  function updateLoadingMsg(text) {
    var el = document.getElementById('cp-loading-msg');
    if (el) el.innerHTML = text || renderLoadingDots();
  }

  function removeLoadingMsg() {
    var el = document.getElementById('cp-loading-msg');
    if (el) el.remove();
  }

  function setHeaderStatus(state, label) {
    var dot = document.getElementById('cpStatusDot');
    var statusLabel = document.getElementById('cpStatusLabel');
    dot.className = 'cp-dot ' + state;
    statusLabel.textContent = label;
  }

  function scrollSteps() {
    var list = document.getElementById('cpStepsList');
    if (list) list.scrollTop = list.scrollHeight;
  }

  function extractText(data) {
    // Только человекочитаемый текст для пользователя.
    // Технические поля code/raw_result/stage/json целиком НЕ показываем как финальный ответ.
    if (data == null) return null;
    if (typeof data === 'string') return data.trim() ? data : null;
    if (typeof data === 'number' || typeof data === 'boolean') return String(data);
    if (Array.isArray(data)) data = normalizeWebhookResponse(data);
    if (isPlainEmptyObject(data)) return null;

    if (typeof data === 'object') {
      var fields = ['response', 'answer', 'result', 'text', 'message', 'output', 'final', 'content', 'value'];

      for (var i = 0; i < fields.length; i++) {
        var key = fields[i];
        if (data[key] != null) {
          var picked = extractText(data[key]);
          if (picked) return picked;
        }
      }

      if (data.json) {
        var jsonText = extractText(data.json);
        if (jsonText) return jsonText;
      }

      if (data.body) {
        var bodyText = extractText(data.body);
        if (bodyText) return bodyText;
      }

      if (data.data) {
        var dataText = extractText(data.data);
        if (dataText) return dataText;
      }
    }

    return null;
  }

  function extractBestUserFacingResult(results) {
    if (!results || !results.length) return null;

    // Идём с конца цепочки назад.
    // Если последний агент вернул только code/raw_result/stage, но не дал
    // человекочитаемый ответ, показываем последний нормальный ответ предыдущего агента.
    for (var i = results.length - 1; i >= 0; i--) {
      var item = results[i];
      if (!item || !item.output) continue;
      var text = extractText(item.output);
      if (text) return {
        text: text,
        sourceStep: item.label || item.stepId || ('step ' + (i + 1)),
        sourceIndex: i
      };
    }

    return null;
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ============================================================
   * Event handlers
   * ============================================================ */
  document.getElementById('cpSend').addEventListener('click', sendMessage);
  document.getElementById('cpInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ============================================================
   * Boot
   * ============================================================ */
  var bootFlags = { n8nOnline: false, serverOnline: false };

  function isDemoModeExplicit() {
    try {
      var p = new URLSearchParams(window.location.search || '');
      return p.get('demo') === '1' || p.get('demo') === 'true';
    } catch (e) {
      return false;
    }
  }

  function n8nUnavailableMessage() {
    return 'n8n proxy недоступен: ' + n8nProxyBase() +
      '. Проверь Start-n8n-proxy-8777.bat, firewall и доступность /n8n-healthz.';
  }

  function boot() {
    // Проверка авторизации. Если токен невалидный — редирект на login.
    GigaChat.auth.requireAuth({
      onOk: function(username) {
        // Проверка n8n
        document.documentElement.classList.remove('gc-pending-auth');

        var n8nCtrl = new AbortController();
        var n8nTimer = setTimeout(function(){ n8nCtrl.abort(); }, 2000);
        fetch(n8nProxyBase() + '/n8n-healthz', { method: 'HEAD', signal: n8nCtrl.signal })
          .then(function() {
            clearTimeout(n8nTimer);
            bootFlags.n8nOnline = true;
            initUI();
          })
          .catch(function(err) {
            clearTimeout(n8nTimer);
            bootFlags.n8nOnline = false;

            if (isDemoModeExplicit()) {
              console.warn('[CP] n8n недоступен, но включён ручной demo режим (?demo=1)');
            } else {
              console.error('[CP] ' + n8nUnavailableMessage(), err);
            }

            initUI();
          });
      }
    });
  }

  boot();
})();
</script>

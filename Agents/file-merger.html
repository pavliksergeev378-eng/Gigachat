                    rels.push({ id: rId, target: 'media/' + fname });
                    return rId;
                }

                for (var s = 0; s < sources.length; s++) {
                    var src = sources[s];
                    // #4: filename-heading режим — перед КАЖДЫМ источником (включая первый)
                    if (settings.separator === 'filename-heading' && src.srcName) {
                        bodyXml += filenameHeadingXml(src.srcName);
                    }
                    // B11: регистрируем все картинки источника заранее → placeholderMap.
                    var placeholderMap = {};
                    for (var im = 0; im < src.images.length; im++) {
                        var srcImg = src.images[im];
                        placeholderMap[srcImg.placeholder] = registerImage(srcImg.bytes, srcImg.ext);
                    }
                    for (var b = 0; b < src.blocks.length; b++) {
                        var bl = src.blocks[b];
                        var xmlChunk = '';
                        if (bl.kind === 'paragraph' || bl.kind === 'table') {
                            // Заменяем placeholder'ы r:embed на globalRId. Picture id (wp:docPr/@id)
                            // оставляем как есть — Word не требует глобальной уникальности.
                            xmlChunk = bl.xml.replace(/__GCEMBED_\d+__/g, function (m) {
                                return placeholderMap[m] || m;
                            });
                        } else if (bl.kind === 'xlsx-table') {
                            xmlChunk = xlsxToWordTableXml(bl);
                        } else if (bl.kind === 'image') {
                            // Standalone image (drag-n-drop пришло как файл)
                            var picIdx = images.length + 1;
                            var rId = registerImage(bl.bytes, bl.ext);
                            xmlChunk = imageParagraphXml(rId, bl.w, bl.h, picIdx);
                        }
                        bodyXml += xmlChunk;
                    }
                    // #4: separator между файлами (только между, не после последнего).
                    // filename-heading сам играет роль разделителя — между файлами ничего не добавляем.
                    if (s < sources.length - 1 && settings.separator !== 'filename-heading') {
                        bodyXml += separatorBetweenFiles();
                    }
                }

                // 3) Собираем .docx zip
                var zip = new JSZip();
                // [Content_Types].xml пишется ниже — после того как выяснится,
                // нужен ли override для word/numbering.xml.
                zip.file('_rels/.rels', MAIN_RELS);
                // #5 + B3: если хоть один из docx-источников вернул styles.xml — берём
                // самый «богатый» (с наибольшим числом <w:style>). Раньше брали
                // ПЕРВЫЙ ненулевой → параграфы из других docx могли ссылаться на
                // styleId которых нет в первом → fallback на default стиль (теряли
                // форматирование). Самый большой styles.xml имеет лучшие шансы
                // покрыть все styleId всех источников.
                var stylesToUse = STYLES_XML;
                var bestStyleCount = -1;
                for (var si = 0; si < sources.length; si++) {
                    var sx = sources[si].stylesXml;
                    if (!sx) continue;
                    var matches = sx.match(/<w:style\b/g);
                    var count = matches ? matches.length : 0;
                    if (count > bestStyleCount) {
                        bestStyleCount = count;
                        stylesToUse = sx;
                    }
                }
                // Баг 14 (visual): word-6/7 styles.xml имеет <w:docDefaults>
                // c <w:spacing after="200" line="276"/> (1.15 межстрочный + 10pt
                // отступ после параграфа). Это применяется ВНУТРИ ячеек таблиц
                // → строки раздуваются, таблица выглядит «широкой/большой».
                // Переписываем docDefaults на наш tight-вариант (after=0 line=240),
                // оставляя все <w:style> определения нетронутыми.
                var TIGHT_DOC_DEFAULTS =
                    '<w:docDefaults>' +
                        '<w:rPrDefault><w:rPr>' +
                            '<w:rFonts w:ascii="Calibri" w:hAnsi="Calibri"/>' +
                            '<w:sz w:val="22"/><w:szCs w:val="22"/>' +
                            '<w:lang w:val="ru-RU"/>' +
                        '</w:rPr></w:rPrDefault>' +
                        '<w:pPrDefault><w:pPr>' +
                            '<w:spacing w:after="0" w:line="240" w:lineRule="auto"/>' +
                        '</w:pPr></w:pPrDefault>' +
                    '</w:docDefaults>';
                if (stylesToUse !== STYLES_XML) {
                    if (/<w:docDefaults>[\s\S]*?<\/w:docDefaults>/.test(stylesToUse)) {
                        stylesToUse = stylesToUse.replace(
                            /<w:docDefaults>[\s\S]*?<\/w:docDefaults>/,
                            TIGHT_DOC_DEFAULTS
                        );
                    } else {
                        // docDefaults не было — вставим сразу после <w:styles ...>
                        stylesToUse = stylesToUse.replace(
                            /<w:styles\b[^>]*>/,
                            function (m) { return m + TIGHT_DOC_DEFAULTS; }
                        );
                    }
                }
                zip.file('word/styles.xml', stylesToUse);
                // Баг 14: numbering.xml — выбираем «самый богатый» (по числу <w:num>).
                // Без него <w:numPr>/<w:pStyle="ListNumber"> теряют форматирование.
                var numberingToUse = null;
                var bestNumCount = -1;
                for (var ni = 0; ni < sources.length; ni++) {
                    var nx = sources[ni].numberingXml;
                    if (!nx) continue;
                    var nm = nx.match(/<w:num\b/g);
                    var nc = nm ? nm.length : 0;
                    if (nc > bestNumCount) {
                        bestNumCount = nc;
                        numberingToUse = nx;
                    }
                }
                if (numberingToUse) {
                    zip.file('word/numbering.xml', numberingToUse);
                }
                // [Content_Types].xml пишем СЕЙЧАС — когда уже знаем про numbering.
                zip.file('[Content_Types].xml', contentTypesXml(images, !!numberingToUse));
                zip.file('word/document.xml', documentXml(bodyXml));
                zip.file('word/_rels/document.xml.rels', documentRelsXml(rels, !!numberingToUse));
                for (var m = 0; m < images.length; m++) {
                    zip.file('word/media/' + images[m].name, images[m].bytes);
                }

                loadingText.textContent = 'Упаковка ZIP...';
                progressFill.style.width = '90%';

                var blob = await zip.generateAsync({
                    type: 'blob',
                    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });

                progressFill.style.width = '100%';
                lastBlob = blob;
                showResult(blob.size, totalBlocks);
                // #6: имя файла из settings, с принудительным .docx суффиксом.
                var dlName = (settings.outputName || 'Объединение файлов').replace(/\.docx$/i, '') + '.docx';
                triggerDownload(blob, dlName);
            } catch (e) {
                showError(e.message || String(e));
            } finally {
                buildBtn.disabled = false;
                // previewBtn возвращаем через updateBuildBtn (он смотрит items.ok > 0)
                updateBuildBtn();
                _loadingHideTimer = setTimeout(function () {
                    loading.style.display = 'none';
                    progressFill.style.width = '0%';
                    _loadingHideTimer = null;
                }, 400);
            }
        }
        buildBtn.addEventListener('click', buildAndDownload);

        // ============ Превью (#8) ============
        // Текстовое описание того, что попадёт в выходной docx — без полной
        // сборки. Прогоняем те же parse-функции (с кешированием через item.cachedParse),
        // считаем статистику.
        var _previewInflight = false; // блок двойного клика
        function openPreview() {
            if (_previewInflight) return; // защита от множественных кликов
            document.getElementById('previewBackdrop').classList.add('open');
            document.getElementById('previewList').innerHTML = 'Анализирую файлы...';
            // Сбрасываем scroll списка в начало (UX: иначе при повторном открытии
            // юзер видит старое положение)
            document.getElementById('previewList').scrollTop = 0;
            document.getElementById('previewSummary').textContent = '—';
            renderPreview();
        }
        function closePreview() {
            document.getElementById('previewBackdrop').classList.remove('open');
        }
        async function renderPreview() {
            _previewInflight = true;
            var listEl = document.getElementById('previewList');
            var summaryEl = document.getElementById('previewSummary');
            var validItems = items.filter(function (it) { return !it.error; });
            if (!validItems.length) {
                listEl.textContent = 'Нет файлов для превью.';
                _previewInflight = false;
                return;
            }
            var html = '';
            var totalBlocks = 0;
            var totalImages = 0;
            // A3 helper: получить или закешировать parsedSrc для item
            async function getOrParseAndCache(it) {
                if (it.cachedParse) return it.cachedParse;
                var parsedSrc;
                if (it.type === 'docx') {
                    var parsed = await parseDocx(it.file);
                    parsedSrc = {
                        blocks: parsed.blocks,
                        images: parsed.images || [],
                        stylesXml: parsed.stylesXml || null,
                        numberingXml: parsed.numberingXml || null,
                        srcName: it.file.name
                    };
                } else if (it.type === 'xlsx') {
                    parsedSrc = { blocks: await parseXlsx(it.file), images: [], srcName: it.file.name };
                } else if (it.type === 'csv') {
                    parsedSrc = { blocks: [await parseCsv(it.file)], images: [], srcName: it.file.name };
                } else if (it.type === 'pdf') {
                    parsedSrc = { blocks: await parsePdf(it.file), images: [], srcName: it.file.name };
                } else if (it.type === 'image') {
                    parsedSrc = { blocks: [await parseImage(it.file)], images: [], srcName: it.file.name };
                }
                it.cachedParse = parsedSrc;
                return parsedSrc;
            }
            for (var i = 0; i < validItems.length; i++) {
                var it = validItems[i];
                var badgeText = it.type === 'docx' ? 'WORD' : it.type === 'xlsx' ? 'EXCEL' : it.type === 'pdf' ? 'PDF' : it.type === 'csv' ? 'CSV' : 'ФОТО';
                var statsHtml = '';
                try {
                    var psrc = await getOrParseAndCache(it);
                    if (it.type === 'docx') {
                        var pCount = psrc.blocks.filter(function (b) { return b.kind === 'paragraph'; }).length;
                        var tCount = psrc.blocks.filter(function (b) { return b.kind === 'table'; }).length;
                        var imgCount = psrc.images.length;
                        statsHtml = 'Параграфов: <code>' + pCount + '</code>, таблиц: <code>' + tCount + '</code>';
                        if (imgCount) statsHtml += ', картинок: <code>' + imgCount + '</code>';
                        if (psrc.stylesXml) statsHtml += '. <i>Стили будут сохранены.</i>';
                        totalBlocks += psrc.blocks.length;
                        totalImages += imgCount;
                    } else if (it.type === 'xlsx') {
                        // Считаем sheets по числу xlsx-table блоков в parsedSrc
                        var sheetCount = psrc.blocks.filter(function (b) { return b.kind === 'xlsx-table'; }).length;
                        if (sheetCount === 1) {
                            var tbl = psrc.blocks.find(function (b) { return b.kind === 'xlsx-table'; });
                            var rows = tbl.grid.length;
                            var cols = rows ? Math.max.apply(null, tbl.grid.map(function (r) { return r.length; })) : 0;
                            statsHtml = 'Один лист: <code>' + rows + '×' + cols + '</code>';
                        } else {
                            statsHtml = 'Листов: <code>' + sheetCount + '</code>';
                        }
                        totalBlocks += psrc.blocks.length;
                    } else if (it.type === 'csv') {
                        var csvBlock = psrc.blocks[0];
                        var csvRows = csvBlock.grid.length;
                        var csvCols = csvRows ? Math.max.apply(null, csvBlock.grid.map(function (r) { return r.length; })) : 0;
                        statsHtml = 'Таблица: <code>' + csvRows + '×' + csvCols + '</code>';
                        totalBlocks += 1;
                    } else if (it.type === 'pdf') {
                        var paraCount = psrc.blocks.filter(function (b) {
                            return b.kind === 'paragraph' && b.xml.indexOf('w:br w:type="page"') < 0;
                        }).length;
                        statsHtml = 'Параграфов из PDF: <code>' + paraCount + '</code>. <i>Только текст — картинки и стили не сохраняются.</i>';
                        totalBlocks += psrc.blocks.length;
                    } else if (it.type === 'image') {
                        var img = psrc.blocks[0]; // {kind:'image', w, h, ext, bytes}
                        statsHtml = 'Размер: <code>' + img.w + '×' + img.h + '</code> пикс, формат <code>' + img.ext + '</code>';
                        totalBlocks += 1;
                        totalImages += 1;
                    }
                } catch (e) {
                    statsHtml = '<span style="color:var(--error)">Ошибка анализа: ' + escapeHtml(e.message || String(e)) + '</span>';
                }
                html +=
                    '<div class="preview-source">' +
                        '<div class="src-head"><span class="badge">' + badgeText + '</span>' + escapeHtml(it.file.name) + '</div>' +
                        '<div class="src-stats">' + statsHtml + '</div>' +
                    '</div>';
            }
            listEl.innerHTML = html;
            var sepLabel = settings.separator === 'page-break' ? 'разрыв страницы' :
                settings.separator === 'filename-heading' ? 'заголовок с именем файла' :
                settings.separator === 'none' ? 'без разделителя' : 'пустая строка';
            summaryEl.textContent = 'Источников: ' + validItems.length +
                ', блоков всего: ' + totalBlocks +
                (totalImages ? ', картинок: ' + totalImages : '') +
                '. Между файлами: ' + sepLabel + '.';
            _previewInflight = false;
        }
        previewBtn.addEventListener('click', openPreview);
        // ESC закрывает превью
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && document.getElementById('previewBackdrop').classList.contains('open')) {
                closePreview();
            }
        });
        // Делаем closePreview доступным глобально для onclick в HTML
        window.closePreview = closePreview;
        downloadBtn.addEventListener('click', function () {
            if (lastBlob) {
                var n = (settings.outputName || 'Объединение файлов').replace(/\.docx$/i, '') + '.docx';
                triggerDownload(lastBlob, n);
            }
        });
        function triggerDownload(blob, filename) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(function () {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // ============ Шаблоны OOXML ============
        var MAIN_RELS =
            '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
            '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
                '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
            '</Relationships>';

        function contentTypesXml(images, hasNumbering) {
            // Уникальные расширения изображений
            var exts = {};
            for (var i = 0; i < images.length; i++) {
                var e = images[i].name.split('.').pop().toLowerCase();
                if (!exts[e]) exts[e] = images[i].contentType;
            }
            var defaults =
                '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
                '<Default Extension="xml" ContentType="application/xml"/>';
            for (var k in exts) {
                defaults += '<Default Extension="' + k + '" ContentType="' + exts[k] + '"/>';
            }
            var overrides =
                '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
                '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>';
            if (hasNumbering) {
                overrides += '<Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/>';
            }
            return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
                    defaults + overrides +
                '</Types>';
        }

        function documentRelsXml(rels, hasNumbering) {
            var inner =
                '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>';
            if (hasNumbering) {
                inner += '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>';
            }
            for (var i = 0; i < rels.length; i++) {
                inner += '<Relationship Id="' + rels[i].id + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="' + rels[i].target + '"/>';
            }
            return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' + inner + '</Relationships>';
        }

        function documentXml(bodyXml) {
            return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<w:document ' +
                    'xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" ' +
                    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" ' +
                    'xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" ' +
                    'xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" ' +
                    'xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture" ' +
                    'xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math" ' +
                    'xmlns:v="urn:schemas-microsoft-com:vml" ' +
                    'xmlns:o="urn:schemas-microsoft-com:office:office" ' +
                    'xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape" ' +
                    'xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup" ' +
                    'xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml" ' +
                    'xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006" ' +
                    'xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"' +
                '>' +
                    '<w:body>' +
                        bodyXml +
                        '<w:sectPr>' +
                            '<w:pgSz w:w="11906" w:h="16838"/>' +
                            '<w:pgMar w:top="1134" w:right="850" w:bottom="1134" w:left="1701" w:header="708" w:footer="708" w:gutter="0"/>' +
                            '<w:cols w:space="708"/>' +
                            '<w:docGrid w:linePitch="360"/>' +
                        '</w:sectPr>' +
                    '</w:body>' +
                '</w:document>';
        }

        // Минимальный styles.xml — нужен потому что некоторые таблицы из source-docx
        // ссылаются на pStyle / rStyle. Если стилей нет — Word откроет с warning'ом.
        // Достаточно нескольких базовых стилей + дефолтный pPrDefault.

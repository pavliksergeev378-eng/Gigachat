<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GigaChat Docs</title>
    <script>(function(){try{var t=localStorage.getItem('giga_theme')||'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.classList.add('gc-pending-auth')}catch(e){document.documentElement.setAttribute('data-theme','light')}})();</script>
    <style>html{background:#1f1f1e}html[data-theme="light"]{background:#fdfdfc}html.gc-pending-auth .sidebar,html.gc-pending-auth .main{display:none !important}</style>
    <style>
        :root {
            --bg-primary: #1f1f1e;
            --bg-secondary: #1f1e1c;
            --bg-sidebar: #262626;
            --bg-input: #2c2c2a;
            --bg-user: rgba(212, 165, 116, 0.10);
            --bg-bot: #1f1e1c;
            --border: #363432;
            --text-primary: #d4d4d4;
            --text-secondary: #8a8a8a;
            --text-muted: #5a5a5a;
            --accent: #d4a574;
            --accent-hover: #c08a5a;
            --sidebar-width: 270px;
        }
        :root[data-theme="light"] {
            --bg-primary: #fdfdfc;
            --bg-secondary: #f3f1ec;
            --bg-sidebar: #fdfdfc;
            --bg-input: #fffffe;
            --bg-user: rgba(184, 137, 93, 0.12);
            --bg-bot: #f3f1ec;
            --border: #e3dfd5;
            --text-primary: #1f1f1e;
            --text-secondary: #6b6b68;
            --text-muted: #a8a59f;
            --accent: #b8895d;
            --accent-hover: #a0764d;
        }
        /* Общие стили чат-агента — в _shared.js через GigaChat.injectAgentCss().
           Здесь только per-page правила. */
        #chat { flex: 1; overflow-y: auto; padding: 20px 40px 45px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .bottom-area { padding: 0 20px 20px 44px; flex-shrink: 0; }
        /* Поле ввода: textarea + иконка-отправки (внутри) + скрепка (снаружи).
           Базовая раскладка задаётся классом .gc-input-row в _shared.js. */
        #input-area { display: flex; gap: 8px; align-items: flex-end; }
        #msg {
            flex: 1; padding: 10px 16px; word-break: break-word; overflow-wrap: anywhere; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-input); color: var(--text-primary);
            font-family: Segoe UI, Tahoma, sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
            resize: none; min-height: 36px; max-height: 130px; line-height: 1.5;
            /* R7.40: overflow-y: hidden — JS переключает на auto, когда контент превышает autosizeMax. */
            overflow-y: hidden; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-track { background: transparent; }
        #msg::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #msg:focus { border-color: var(--accent); }
        #msg:disabled { opacity: 0.4; }
        #msg::placeholder { color: var(--text-muted); }
        /* .empty-chat — базовое правило в _shared.js (injectAgentCss). */
        /* R8.82: кликабельные имена документов в списке (клик → контент).
           R8.83: номер «N. » печатается ВНЕ ссылки (белый), ссылка — только имя. */
        #chat a.gc-doclink { color: var(--accent); cursor: pointer; text-decoration: none; border-bottom: 1px dashed var(--accent); }
        #chat a.gc-doclink:hover { color: var(--accent-hover); border-bottom-color: var(--accent-hover); background: var(--bg-user); }
        /* R8.83: заголовок контента документа — кастомная иконка-файл + имя
           (вместо эмодзи 📄). Маркер [[DOCHEAD|name]] → span в formatMarkdown. */
        #chat .gc-dochead { display: inline-flex; align-items: center; gap: 9px; vertical-align: text-bottom; }
        #chat .gc-dochead svg { width: 19px; height: 19px; flex-shrink: 0; color: var(--accent); }
        #chat .gc-dochead-name { font-weight: 600; color: var(--text-primary); }
    </style>
    <script src="_config.js"></script>
    <link rel="stylesheet" href="lib/hljs-dark.min.css" id="hljs-theme-dark">
    <link rel="stylesheet" href="lib/hljs-light.min.css" id="hljs-theme-light" disabled>
    <script src="lib/highlight.min.js"></script>
    <script src="_shared-guard.js"></script>
    <script src="_shared.js"></script>
    <script src="lib/jszip.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a class="btn-home" href="../GigaChat-Platform.html" aria-label="Назад к GigaChat"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="sidebar-header"><h3>Сессии</h3></div>
        <div class="sidebar-add"><button onclick="createNewSession()">Новая сессия</button></div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <header>
            <div class="header-left"><h1>GigaChat Docs</h1></div>
            <div class="header-right">
                <div class="status" id="statusBar"><span class="dot checking" id="statusDot"></span><span id="statusText">проверка...</span></div>
            </div>
        </header>
        <div id="chat"><div class="empty-chat">Создайте новую сессию для начала работы</div></div>
        <div class="bottom-area">
            <div class="gc-attach-chips" id="attachChips"></div>
            <div id="input-area" class="gc-input-row">
                <div class="gc-input-wrap">
                    <textarea id="msg" rows="1" placeholder="Задайте вопрос по документам..." disabled></textarea>
                    <button id="send" class="gc-send-icon" onclick="sendMsg()" disabled aria-label="Отправить">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                    </button>
                </div>
                <span id="attachBtn"></span>
            </div>
        </div>
    </div>
    <script>
        // Auth-gate + изоляция сессий/history per user (userScoped:true).
        GigaChat.auth.requireAuth({ onOk: function () {
            document.documentElement.classList.remove('gc-pending-auth');
            GigaChat.createChatAgent({
                userScoped: true,
                webhookPath: 'rag',
                // R8.82: клик по имени документа кладёт сюда doc_get='source|id';
                // workflow по нему отдаёт ПОЛНЫЙ контент документа. Токен добавляется
                // автоматически (userScoped). Чистим сразу после использования.
                // R8.89: при открытии документа — doc_get (контент без LLM). При
                // обычном вопросе — focus_doc='source|id' ПОСЛЕДНЕГО открытого
                // документа: workflow делает АКЦЕНТ поиска именно на нём.
                extraBody: function () {
                    var dg = window.__ragDocGet; window.__ragDocGet = null;
                    window.__ragClickLock = false; // R2: doc_get захвачен — снимаем lock клика
                    if (dg) return { doc_get: dg };
                    return window.__ragLastDoc ? { focus_doc: window.__ragLastDoc } : {};
                },
                // R8.89: смена сессии сбрасывает «акцент на документ» — в новой
                // сессии нет открытого документа, пока юзер не откроет его снова.
                onSwitchExtra: function () { window.__ragLastDoc = null; },
                historyPath: 'history',
                prefix: 'rag',
                idPrefix: 'rag_',
                namePrefix: 'Docs-',
                inflightLabel: 'Ищу в документах',
                exportAgentName: 'GigaChat Docs',
                // R8.80: список документов из БД (mode='list_documents' в workflow)
                // отвечает мгновенно без LLM → кольцо-загрузчик с таймером не нужно.
                // Паттерны синхронизированы с узлом «Классификатор» (rag-agent.json).
                // Если фронт не распознал (drift) — максимум мелькнёт кольцо, не критично.
                skipInflightFor: function (msg) {
                    if (window.__ragDocGet) return true; // R8.82: открытие документа — тоже мгновенно, без кольца
                    var lower = (msg || '').toLowerCase();
                    var listIndicators = ['какие документ','какие файл','список документ','список файл','покажи документ','покажи файл','покажи все документ','покажи все файл','что загружен','что есть в баз','что есть в документ','документы в базе','файлы в базе','перечисли документ','перечисли файл','имена документ','имена файл','названия документ','названия файл','все документ','все файл','сколько документ','сколько файл','количество документ','количество файл','кол-во документ','кол-во файл','число документ','число файл','все мои документ','все мои файл','покажи мои документ','мои документ','мои файл','есть документ','есть файл','что у меня в баз','что в баз','покажи всё','покажи все'];
                    for (var i = 0; i < listIndicators.length; i++) { if (lower.indexOf(listIndicators[i]) !== -1) return true; }
                    var tablePatterns = [/в\s+виде\s+таблиц/, /таблиц[ауеыйо]*\s+(документ|файл|загруж)/, /(документ|файл|загруж)\w*\s+\w*\s*(в\s+таблиц|таблицей|списком)/, /представ\w*\s+(документ|файл|базу)/, /выведи\s+(документ|файл|список)/, /оформи\s+(документ|файл)\w*\s+(в\s+таблиц|таблицей)/];
                    for (var j = 0; j < tablePatterns.length; j++) { if (tablePatterns[j].test(lower)) return true; }
                    return false;
                },
                emptyChatHtml: '<div class="empty-chat">Создайте новую сессию для начала работы</div>',
                historyErrorHtml: '<div class="empty-chat">Не удалось загрузить историю.</div>',
                historyLoadingHtml: '<div class="empty-chat">Загружаю историю...</div>'
            });
            // R8.82: клик по имени документа в списке → плавный скролл вниз +
            // печатается полный контент. Имя — <a class="gc-doclink" data-doc-src
            // data-doc-id> (правило в formatMarkdown). Клик кладёт doc_get для
            // extraBody и вызывает sendMsg (он сам скроллит к низу и стримит ответ).
            document.addEventListener('click', function (e) {
                var a = e.target.closest && e.target.closest('a.gc-doclink');
                if (!a) return;
                e.preventDefault();
                // R2: пока первый запрос не забрал __ragDocGet в extraBody, второй клик
                // по документу не даём (иначе перезапишет → откроется не тот документ).
                if (window.__ragClickLock) return;
                window.__ragClickLock = true;
                setTimeout(function () { window.__ragClickLock = false; }, 3000);
                var source = a.getAttribute('data-doc-src') || 'internal';
                var docId = '';
                try { docId = decodeURIComponent(a.getAttribute('data-doc-id') || ''); } catch (_) { docId = a.getAttribute('data-doc-id') || ''; }
                if (!docId) return;
                var name = (a.textContent || '').replace(/^\s*\d+\.\s*/, '').replace(/\s*\(\d+\s*фрагм\.\)\s*$/, '').trim();
                window.__ragDocGet = source + '|' + docId;
                window.__ragLastDoc = source + '|' + docId; // R8.89: «акцент» в следующих LLM-вопросах
                var inp = document.getElementById('msg');
                if (inp) inp.value = 'Содержание: «' + (name || 'документ') + '»';
                if (typeof sendMsg === 'function') sendMsg();
            });
        }});
    </script>
</body>
</html>
